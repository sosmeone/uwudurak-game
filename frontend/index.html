<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дурак</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --felt: #1b4d32;
  --felt-dark: #0f2d1c;
  --felt-light: #246040;
  --gold: #d4a84b;
  --gold-light: #f0cc7a;
  --gold-dim: rgba(212,168,75,0.35);
  --card-bg: #fdf6e3;
  --card-face: #fffef8;
  --red: #c0392b;
  --deep-red: #8b1a1a;
  --ink: #1a1008;
  --text: #f0e6c8;
  --text-dim: rgba(240,230,200,0.45);
  --shadow: rgba(0,0,0,0.55);
  --trump-glow: rgba(212,168,75,0.5);
  --radius: 7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Lora', serif;
  background: var(--felt-dark);
  color: var(--text);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: relative;
}

/* Felt texture */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 45%, rgba(27,77,50,0.9) 0%, rgba(15,45,28,0.95) 100%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Ccircle cx='20' cy='20' r='1'/%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}

/* ===================== SCREENS ===================== */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

/* ===================== MENU ===================== */
#s-menu { gap: 24px; }

.logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(44px, 12vw, 64px);
  font-weight: 900;
  line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 40px var(--trump-glow), 0 4px 0 rgba(100,60,0,0.8);
  letter-spacing: -3px;
}
.logo em { color: #fff; font-style: normal; }
.suits-row { display: flex; gap: 10px; font-size: 28px; opacity: 0.8; }
.suits-row span:nth-child(1), .suits-row span:nth-child(4) { color: var(--text); }
.suits-row span:nth-child(2), .suits-row span:nth-child(3) { color: #e74c3c; }

.menu-label {
  font-family: 'Unbounded', sans-serif; font-size: 10px;
  letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase;
}

.btn {
  font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700;
  padding: 15px 36px; border: none; border-radius: 5px; cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s; letter-spacing: 0.5px;
  text-transform: uppercase; min-width: 220px;
}
.btn-gold {
  background: linear-gradient(180deg, #e8bc56 0%, #c4962a 100%);
  color: #1a0f00;
  box-shadow: 0 4px 0 #7a5800, 0 8px 24px rgba(212,168,75,0.35);
}
.btn-gold:active { transform: translateY(3px); box-shadow: 0 1px 0 #7a5800; }
.btn-outline {
  background: transparent; color: var(--gold);
  border: 1.5px solid var(--gold-dim);
}
.btn-outline:active { background: rgba(212,168,75,0.08); }

/* ===================== WAITING ===================== */
#s-wait { gap: 20px; }
.spinner {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px solid rgba(212,168,75,0.15); border-top-color: var(--gold);
  animation: spin 1s linear infinite;
}
.wait-title { font-family: 'Unbounded', sans-serif; font-size: 13px; color: var(--gold); letter-spacing: 2px; }
.wait-sub { font-size: 12px; color: var(--text-dim); text-align: center; max-width: 260px; line-height: 1.6; }

/* ===================== GAME ===================== */
#s-game {
  justify-content: space-between;
  padding: 8px 8px env(safe-area-inset-bottom, 8px);
}

/* Opponent row */
.opponent-row { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.p-label {
  font-family: 'Unbounded', sans-serif; font-size: 9px;
  letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
}
.opp-hand-wrap { display: flex; justify-content: center; }

/* Table zone */
.table-zone {
  flex: 1; width: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; gap: 6px;
}

.info-sidebar {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.deck-stack { position: relative; width: 46px; height: 66px; }
.deck-stack .c-back { position: absolute; border-radius: 6px; }
.deck-stack .c-back:nth-child(1) { width: 46px; height: 66px; top: 0; left: 0; }
.deck-stack .c-back:nth-child(2) { width: 44px; height: 64px; top: 1px; left: 1px; }
.deck-count {
  font-family: 'Unbounded', sans-serif; font-size: 11px; color: var(--gold); text-align: center;
}
.trump-badge { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.trump-lbl { font-size: 8px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; }
.trump-icon { font-size: 28px; line-height: 1; filter: drop-shadow(0 0 6px var(--trump-glow)); }

/* Battle zone */
.battle-zone {
  display: flex; flex-wrap: wrap; gap: 5px;
  justify-content: center; align-items: flex-start;
  min-height: 88px; width: calc(100% - 72px); padding: 0 4px;
}
.pair { position: relative; display: inline-flex; flex-direction: column; align-items: center; }
.pair .def-card { margin-top: -22px; }

/* Status */
.status-bar {
  font-family: 'Unbounded', sans-serif; font-size: 10px;
  color: var(--gold-light); letter-spacing: 1.5px;
  text-align: center; min-height: 18px; padding: 0 8px;
}

/* Action row */
.action-row { display: flex; gap: 10px; }
.btn-sm {
  font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700;
  padding: 10px 22px; border-radius: 5px; border: none; cursor: pointer;
  letter-spacing: 0.5px; transition: transform 0.1s, box-shadow 0.1s;
  text-transform: uppercase;
}
.btn-take { background: rgba(192,57,43,0.9); color: #fff; box-shadow: 0 3px 0 rgba(100,0,0,0.6); }
.btn-take:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(100,0,0,0.6); }
.btn-done { background: rgba(39,174,96,0.9); color: #fff; box-shadow: 0 3px 0 rgba(0,80,30,0.6); }
.btn-done:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,80,30,0.6); }
.btn-sm:disabled { opacity: 0.28; pointer-events: none; }

/* Player hand */
.my-row { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.hand-wrap { display: flex; justify-content: center; overflow: visible; }

/* ===================== CARD ===================== */
.card {
  width: 48px; height: 70px; border-radius: var(--radius);
  background: var(--card-face);
  border: 1.5px solid rgba(0,0,0,0.12);
  box-shadow: 0 2px 8px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.9);
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 3px 4px; position: relative; flex-shrink: 0;
  transition: transform 0.14s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.14s;
  cursor: pointer;
}
.card.playable:hover { transform: translateY(-9px); box-shadow: 0 12px 22px var(--shadow); }
.card.selected {
  transform: translateY(-16px);
  box-shadow: 0 16px 28px var(--shadow), 0 0 0 2.5px var(--gold), 0 0 18px var(--trump-glow);
}
.card.trump { border-color: rgba(212,168,75,0.7); box-shadow: 0 2px 8px var(--shadow), 0 0 10px var(--trump-glow); }
.card.trump.selected { box-shadow: 0 16px 28px var(--shadow), 0 0 0 2.5px var(--gold), 0 0 24px var(--trump-glow); }

.card-tl, .card-br { display: flex; flex-direction: column; align-items: center; line-height: 1; }
.card-br { transform: rotate(180deg); }
.rank { font-family: 'Lora', serif; font-weight: 700; font-size: 14px; }
.suit-sm { font-size: 11px; }
.suit-lg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-52%); font-size: 22px; }

.card.red .rank, .card.red .suit-sm, .card.red .suit-lg { color: var(--red); }
.card.black .rank, .card.black .suit-sm, .card.black .suit-lg { color: var(--ink); }

.c-back {
  width: 48px; height: 70px; border-radius: var(--radius);
  background: linear-gradient(135deg, #1c3d8f 0%, #0c1f60 100%);
  border: 1.5px solid rgba(255,255,255,0.14);
  box-shadow: 0 2px 8px var(--shadow);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.c-back::before {
  content: ''; position: absolute; inset: 5px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
}
.c-back::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.03) 4px,rgba(255,255,255,0.03) 5px);
}

/* Hand fan */
.hand-wrap .card, .hand-wrap .c-back { margin-left: -14px; }
.hand-wrap .card:first-child, .hand-wrap .c-back:first-child { margin-left: 0; }

/* ===================== RESULT ===================== */
#s-result { gap: 22px; }
.result-emoji { font-size: 68px; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
.result-title {
  font-family: 'Unbounded', sans-serif; font-size: 30px; font-weight: 900;
  color: var(--gold); text-shadow: 0 0 28px var(--trump-glow);
  letter-spacing: -1px;
}
.result-sub { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }

/* ===================== TOAST ===================== */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,10,0.88); backdrop-filter: blur(4px);
  color: #fff; padding: 9px 20px; border-radius: 20px;
  font-family: 'Unbounded', sans-serif; font-size: 11px; letter-spacing: 0.5px;
  z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Turn glow on battle zone */
.battle-zone.my-turn { box-shadow: inset 0 0 0 1.5px rgba(212,168,75,0.25), 0 0 20px rgba(212,168,75,0.08); border-radius: 8px; }

/* ===================== ANIMATIONS ===================== */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes deal { from{transform:translateY(-40px) scale(0.85);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
@keyframes glow-pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

.deal-in { animation: deal 0.28s cubic-bezier(0.34,1.3,0.64,1) both; }
</style>
</head>
<body>

<!-- MENU -->
<div id="s-menu" class="screen">
  <div class="logo-wrap">
    <div class="logo">ДУ<em>РА</em>К</div>
    <div class="suits-row"><span>♠</span><span>♥</span><span>♦</span><span>♣</span></div>
  </div>
  <div class="menu-label">Карткова гра · 1 vs 1</div>
  <button class="btn btn-gold" onclick="findGame()">🎮 Знайти суперника</button>
  <button class="btn btn-outline" id="btn-rules" onclick="showRules()">📖 Правила</button>
</div>

<!-- WAITING -->
<div id="s-wait" class="screen hidden">
  <div class="spinner"></div>
  <div class="wait-title">Шукаємо суперника…</div>
  <div class="wait-sub">Очікуємо другого гравця. Надішліть посилання на бота другу, щоб зіграти разом.</div>
  <button class="btn btn-outline" style="padding:10px 24px;font-size:11px;" onclick="cancelWait()">Скасувати</button>
</div>

<!-- GAME -->
<div id="s-game" class="screen hidden">
  <!-- Opponent -->
  <div class="opponent-row">
    <div class="p-label" id="opp-name">Суперник</div>
    <div class="opp-hand-wrap" id="opp-hand"></div>
  </div>

  <!-- Table -->
  <div class="table-zone">
    <div class="battle-zone" id="battle-zone"></div>
    <div class="status-bar" id="status-bar">З'єднання…</div>
    <div class="info-sidebar">
      <div class="deck-stack" id="deck-vis">
        <div class="c-back"></div>
      </div>
      <div class="deck-count" id="deck-count">36</div>
      <div class="trump-badge">
        <div class="trump-lbl">Козир</div>
        <div class="trump-icon" id="trump-icon">♠</div>
      </div>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="btn-sm btn-take" id="btn-take" onclick="doTake()" disabled>Взяти</button>
    <button class="btn-sm btn-done" id="btn-done" onclick="doDone()" disabled>Бито!</button>
  </div>

  <!-- My hand -->
  <div class="my-row">
    <div class="p-label">Ваші карти</div>
    <div class="hand-wrap" id="my-hand"></div>
  </div>
</div>

<!-- RESULT -->
<div id="s-result" class="screen hidden">
  <div class="result-emoji" id="r-icon">🃏</div>
  <div class="result-title" id="r-title">ДУРАК!</div>
  <div class="result-sub" id="r-sub"></div>
  <button class="btn btn-gold" onclick="findGame()">🔄 Ще раз</button>
  <button class="btn btn-outline" onclick="showScreen('menu')" style="padding:12px 36px;font-size:12px;">Меню</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== INIT =====================
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor?.('#0f2d1c'); }

// Get user info from Telegram or URL params
const urlParams = new URLSearchParams(location.search);
let MY_ID, MY_NAME;

if (tg?.initDataUnsafe?.user) {
  MY_ID = String(tg.initDataUnsafe.user.id);
  MY_NAME = tg.initDataUnsafe.user.first_name || 'Гравець';
} else {
  MY_ID = urlParams.get('userId') || 'guest_' + Math.random().toString(36).slice(2, 8);
  MY_NAME = decodeURIComponent(urlParams.get('username') || 'Гравець');
}

const WS_URL = (() => {
  const h = location.hostname;
  // In production replace with your server URL
  if (h === 'localhost' || h === '127.0.0.1') return `ws://localhost:3000`;
  return `wss://${h}`;
})();

// ===================== WEBSOCKET =====================
let ws = null;
let gameState = null;
let selectedCard = null;
let pendingDefenseAttack = null; // attack card waiting for defense selection

function connect(onOpen) {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { if (onOpen) onOpen(); };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onclose = () => {
    if (gameState && gameState.phase !== 'done') showToast('З\'єднання перервано');
  };
  ws.onerror = () => showToast('Помилка підключення до сервера');
}

function send(msg) {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function findGame() {
  showScreen('wait');
  if (ws && ws.readyState === WebSocket.OPEN) {
    send({ type: 'join', userId: MY_ID, username: MY_NAME });
  } else {
    connect(() => send({ type: 'join', userId: MY_ID, username: MY_NAME }));
  }
}

function cancelWait() {
  ws?.close();
  showScreen('menu');
}

// ===================== MESSAGE HANDLER =====================
function handleMessage(msg) {
  switch (msg.type) {
    case 'waiting':
      showScreen('wait');
      break;

    case 'matched':
      showToast(`Знайдено суперника: ${msg.opponentName}!`);
      showScreen('game');
      break;

    case 'state':
      gameState = msg;
      render(msg);
      break;

    case 'error':
      showToast(msg.message);
      if (pendingDefenseAttack) { pendingDefenseAttack = null; selectedCard = null; render(gameState); }
      break;

    case 'opponent_left':
      showToast('Суперник відключився');
      setTimeout(() => endScreen('win', 'Суперник вийшов з гри'), 1000);
      break;
  }
}

// ===================== RENDER =====================
function render(s) {
  if (!s) return;

  // Trump
  const trumpIcon = document.getElementById('trump-icon');
  trumpIcon.textContent = s.trumpSuit;
  trumpIcon.style.color = isRed(s.trumpSuit) ? '#e74c3c' : 'var(--text)';

  // Deck
  document.getElementById('deck-count').textContent = s.deckCount > 0 ? s.deckCount : '—';
  document.getElementById('deck-vis').style.opacity = s.deckCount > 0 ? '1' : '0.2';

  // Opponent name + hand
  document.getElementById('opp-name').textContent = `${s.opponentName} (${s.opponentCardCount})`;
  renderOppHand(s.opponentCardCount);

  // Battle zone
  renderTable(s);

  // My hand
  renderMyHand(s);

  // Buttons
  updateButtons(s);

  // Status
  updateStatus(s);

  // Win check
  if (s.phase === 'done') {
    setTimeout(() => {
      if (s.winner === 'draw') endScreen('draw');
      else if (s.winner === s.myId) endScreen('win');
      else endScreen('lose');
      // Send result to Telegram bot
      tg?.sendData?.(JSON.stringify({ result: s.winner === s.myId ? 'win' : (s.winner === 'draw' ? 'draw' : 'lose') }));
    }, 800);
  }
}

function isRed(suit) { return suit === '♥' || suit === '♦'; }
function isTrump(card, s) { return s && card?.suit === s.trumpSuit; }

function renderOppHand(count) {
  const el = document.getElementById('opp-hand');
  el.innerHTML = '';
  const MAX_SHOW = Math.min(count, 12);
  for (let i = 0; i < MAX_SHOW; i++) {
    const c = document.createElement('div');
    c.className = 'c-back deal-in';
    c.style.animationDelay = `${i * 0.04}s`;
    el.appendChild(c);
  }
}

function renderTable(s) {
  const zone = document.getElementById('battle-zone');
  zone.innerHTML = '';
  zone.classList.toggle('my-turn', s.isAttacker && s.table.length === 0);

  s.table.forEach(pair => {
    const wrap = document.createElement('div');
    wrap.className = 'pair';
    wrap.appendChild(buildCard(pair.attack, false));
    if (pair.defense) {
      const def = buildCard(pair.defense, false);
      def.classList.add('def-card');
      wrap.appendChild(def);
    } else if (!s.isAttacker && s.phase === 'defense') {
      // Clickable attack card for defense selection
      const atk = wrap.firstChild;
      if (pendingDefenseAttack && pendingDefenseAttack.rank === pair.attack.rank && pendingDefenseAttack.suit === pair.attack.suit) {
        atk.style.outline = '2px solid var(--gold)';
        atk.style.outlineOffset = '2px';
      }
      atk.style.cursor = 'pointer';
      atk.onclick = (e) => { e.stopPropagation(); selectAttackTarget(pair.attack); };
    }
    zone.appendChild(wrap);
  });
}

function selectAttackTarget(attackCard) {
  pendingDefenseAttack = attackCard;
  selectedCard = null;
  renderMyHand(gameState);
  showToast('Виберіть карту для відбивання');
}

function renderMyHand(s) {
  const el = document.getElementById('my-hand');
  el.innerHTML = '';
  const hand = [...s.myHand].sort((a, b) => {
    const si = ['♠','♥','♦','♣'];
    if (a.suit !== b.suit) return si.indexOf(a.suit) - si.indexOf(b.suit);
    const rv = {'6':0,'7':1,'8':2,'9':3,'10':4,'J':5,'Q':6,'K':7,'A':8};
    return rv[a.rank] - rv[b.rank];
  });

  hand.forEach((card, i) => {
    const el2 = buildCard(card, true, s);
    el2.style.zIndex = i;
    el2.onclick = () => onMyCardClick(card, s);
    el.appendChild(el2);
  });
}

function buildCard(card, playable, s) {
  const div = document.createElement('div');
  const color = isRed(card.suit) ? 'red' : 'black';
  const trump = s ? isTrump(card, s) : false;
  div.className = `card ${color}${trump ? ' trump' : ''}${playable ? ' playable' : ''}`;

  const isSelected = selectedCard && selectedCard.rank === card.rank && selectedCard.suit === card.suit;
  if (isSelected) div.classList.add('selected');

  div.innerHTML = `
    <div class="card-tl"><span class="rank">${card.rank}</span><span class="suit-sm">${card.suit}</span></div>
    <span class="suit-lg">${card.suit}</span>
    <div class="card-br"><span class="rank">${card.rank}</span><span class="suit-sm">${card.suit}</span></div>
  `;
  return div;
}

// ===================== CARD CLICK =====================
function onMyCardClick(card, s) {
  if (s.phase === 'done') return;

  if (s.isAttacker && s.phase === 'attack') {
    // Attack: play card directly
    pendingDefenseAttack = null;
    selectedCard = null;
    send({ type: 'attack', card });

  } else if (s.isDefender && s.phase === 'defense') {
    if (!pendingDefenseAttack) {
      // First tap: select defense card, prompt to pick attack
      selectedCard = card;
      renderMyHand(s);
      renderTable(s);
      showToast('Тепер натисніть карту яку відбиваєте');
    } else {
      // Second tap: play defense
      const attack = pendingDefenseAttack;
      pendingDefenseAttack = null;
      selectedCard = null;
      send({ type: 'defend', attack, defense: card });
    }

  } else if (s.isAttacker && s.phase === 'attack' && s.table.length > 0) {
    // Pile-on (підкидання)
    send({ type: 'attack', card });
  }
}

// ===================== ACTIONS =====================
function doTake() { send({ type: 'take' }); }
function doDone() { send({ type: 'done' }); }

function updateButtons(s) {
  const take = document.getElementById('btn-take');
  const done = document.getElementById('btn-done');

  // Take: only defender can take when there are undefended cards
  const hasUndefended = s.table.some(p => !p.defense);
  take.disabled = !(s.isDefender && s.table.length > 0);

  // Done: attacker can say done when all cards are defended
  const allDefended = s.table.length > 0 && s.table.every(p => p.defense);
  done.disabled = !(s.isAttacker && allDefended);
}

function updateStatus(s) {
  const bar = document.getElementById('status-bar');
  if (s.phase === 'done') { bar.textContent = ''; return; }

  const hasUndefended = s.table.some(p => !p.defense);
  if (s.isAttacker) {
    if (s.table.length === 0) bar.textContent = 'Ваш хід — кидайте карту';
    else if (s.table.every(p => p.defense)) bar.textContent = 'Відбив! Підкиньте ще або "Бито!"';
    else bar.textContent = 'Суперник відбивається…';
  } else {
    if (hasUndefended) bar.textContent = 'Відбийте атаку суперника';
    else bar.textContent = 'Чекаємо підкидання…';
  }
}

// ===================== RESULT =====================
function endScreen(result, customSub) {
  const icon = document.getElementById('r-icon');
  const title = document.getElementById('r-title');
  const sub = document.getElementById('r-sub');
  if (result === 'win') {
    icon.textContent = '🏆'; title.textContent = 'ПЕРЕМОГА!';
    title.style.color = '#2ecc71';
    sub.textContent = customSub || 'Суперник — дурак! Вітаємо!';
  } else if (result === 'lose') {
    icon.textContent = '😅'; title.textContent = 'ДУРАК!';
    title.style.color = 'var(--gold)';
    sub.textContent = customSub || 'Цього разу не вийшло… Реванш?';
  } else {
    icon.textContent = '🤝'; title.textContent = 'НІЧИЯ!';
    title.style.color = '#3498db';
    sub.textContent = 'Обидва гравці закінчили одночасно!';
  }
  showScreen('result');
}

// ===================== UTILS =====================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('s-' + name)?.classList.remove('hidden');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function showRules() {
  showToast('Відкрийте @YourDurakBot для правил');
}

// Start on menu
showScreen('menu');
</script>
